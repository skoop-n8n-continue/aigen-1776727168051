<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Promotion</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="canvas">
        <video class="bg-video" src="assets/template_blank_tiers.mp4" autoplay muted loop playsinline></video>

        <div class="overlay">
            <!-- Header -->
            <div class="header">
                <img src="assets/logos/PNG/QR_Logo_WhiteBackground.png" class="logo" alt="QR Logo">
            </div>

            <!-- Tiers Container -->
            <div class="tiers-container">
                <!-- Tier 1 -->
                <div class="tier">
                    <h2 class="tier-name">BASIC</h2>
                    <div class="tier-price">$19<span class="frequency">/mo</span></div>
                    <ul class="features">
                        <li>10 GB Storage</li>
                        <li>Basic Support</li>
                        <li>1 User</li>
                    </ul>
                </div>
                <!-- Tier 2 -->
                <div class="tier">
                    <h2 class="tier-name">PRO</h2>
                    <div class="tier-price">$49<span class="frequency">/mo</span></div>
                    <ul class="features">
                        <li>100 GB Storage</li>
                        <li>Priority Support</li>
                        <li>5 Users</li>
                    </ul>
                </div>
                <!-- Tier 3 -->
                <div class="tier">
                    <h2 class="tier-name">ENTERPRISE</h2>
                    <div class="tier-price">$99<span class="frequency">/mo</span></div>
                    <ul class="features">
                        <li>Unlimited Storage</li>
                        <li>24/7 Support</li>
                        <li>Unlimited Users</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
