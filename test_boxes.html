<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizer</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        .canvas { width: 1920px; height: 1080px; position: relative; }
        .bg-img { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; z-index: 1; opacity: 1; }
        .tiers-container {
            position: absolute;
            top: 260px; /* Guessing top edge */
            left: 100px;
            width: 1720px;
            height: 750px;
            display: flex;
            justify-content: space-between;
            gap: 40px;
            z-index: 2;
        }
        .tier {
            background: rgba(255, 0, 0, 0.4);
            border: 2px solid red;
            border-radius: 20px;
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="canvas">
        <img class="bg-img" src=".tmp/frames/frame.jpg" />
        <div class="tiers-container">
            <div class="tier"></div>
            <div class="tier"></div>
            <div class="tier"></div>
        </div>
    </div>
</body>
</html>
